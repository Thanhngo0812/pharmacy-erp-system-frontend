# .github/workflows/frontend-cd.yml
name: Frontend CD Deployment

on:
  push:
    branches: [ "main" ] # Chạy khi merge vào main
    paths:
      - 'pharmacy-erp-frontend/**' # Chỉ chạy khi frontend có thay đổi

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./pharmacy-erp-frontend
          file: ./pharmacy-erp-frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:${{ github.sha }}, ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:latest

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          password: ${{ secrets.DO_PASSWORD }}
          script: |
            # 1. Di chuyển vào thư mục dự án (tùy chỉnh lại đường dẫn thực tế trên server)
            cd ~/my-app
            
            # 2. Đăng nhập Docker Hub (nếu private repo)
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            
            # Đảm bảo file .env tồn tại
            touch .env
            grep -q "^DOCKER_USERNAME=" .env && sed -i "s|^DOCKER_USERNAME=.*|DOCKER_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}|" .env || echo "DOCKER_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            
            # 3. Kéo bản mới nhất của frontend
            docker compose pull frontend-app
            
            # 4. Khởi động lại container frontend
            docker compose up -d --remove-orphans frontend-app
            
            # 5. Dọn dẹp images cũ
            docker image prune -f
